name: Content Pipeline

on:
  schedule:
    - cron: '0 8 * * 1,3,5'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          KE_API_KEY: ${{ secrets.KE_API_KEY }}
          GSC_CLIENT_ID: ${{ secrets.GSC_CLIENT_ID }}
          GSC_CLIENT_SECRET: ${{ secrets.GSC_CLIENT_SECRET }}
          GSC_REFRESH_TOKEN: ${{ secrets.GSC_REFRESH_TOKEN }}
          GOOGLE_ALERT_RSS: ${{ secrets.GOOGLE_ALERT_RSS }}
          GOOGLE_ALERT_RSS_2: ${{ secrets.GOOGLE_ALERT_RSS_2 }}
        run: node scripts/pipeline.js

      - name: Commit and publish generated articles
        run: |
          git config user.email "hello@glp3md.com"
          git config user.name "glp3md pipeline"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "pipeline: add generated articles $(date +%Y-%m-%d)"
            git push
          fi

      - name: Upload pipeline summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-summary
          path: pipeline-summary.txt
